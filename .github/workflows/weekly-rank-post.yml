name: weekly-rank-post

on:
  schedule:
    - cron: '0 0 * * 4'  # Every Thursday 0:00 UTC (9:00 JST)
  workflow_dispatch:      # Allow manual trigger

jobs:
  send-rank-post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Generate and send rank post
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          cd agents/marketing-op
          python3 generate-rank-post.py > /tmp/message.txt
          cat /tmp/message.txt
          python3 - <<'EOF'
          import os, sys, urllib.request, json

          with open('/tmp/message.txt', 'r') as f:
              text = f.read().strip()

          token = os.environ['TELEGRAM_BOT_TOKEN']
          chat_id = os.environ['TELEGRAM_CHAT_ID']

          data = json.dumps({
              'chat_id': chat_id,
              'text': text,
              'parse_mode': 'Markdown',
              'disable_web_page_preview': True
          }).encode('utf-8')

          req = urllib.request.Request(
              f'https://api.telegram.org/bot{token}/sendMessage',
              data=data,
              headers={'Content-Type': 'application/json; charset=utf-8'}
          )
          resp = urllib.request.urlopen(req)
          result = json.loads(resp.read())
          print(f"✅ Sent: message_id={result['result']['message_id']}")
          EOF
